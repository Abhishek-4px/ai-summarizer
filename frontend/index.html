<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Text Summarizer</title>
  <meta name="description" content="Summarize any text instantly using AI. Get concise summaries and key points powered by OpenAI." />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
      background: #0f1117;
      color: #e4e4e7;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #6366f1, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.25rem;
    }

    .subtitle {
      color: #71717a;
      font-size: 0.95rem;
      margin-bottom: 2rem;
    }

    .card {
      background: #1a1b23;
      border: 1px solid #27272a;
      border-radius: 16px;
      padding: 1.75rem;
      width: 100%;
      max-width: 680px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      font-weight: 600;
      margin-bottom: 0.5rem;
      font-size: 0.9rem;
      color: #a1a1aa;
    }

    textarea {
      width: 100%;
      height: 180px;
      background: #0f1117;
      border: 1px solid #3f3f46;
      border-radius: 10px;
      color: #e4e4e7;
      padding: 1rem;
      font-size: 0.95rem;
      font-family: inherit;
      resize: vertical;
      transition: border-color 0.2s;
    }

    textarea:focus {
      outline: none;
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
    }

    .counter {
      text-align: right;
      font-size: 0.8rem;
      color: #71717a;
      margin-top: 0.4rem;
      transition: color 0.2s;
    }

    .counter.limit { color: #ef4444; font-weight: 600; }

    button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.75rem 1.75rem;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s, transform 0.1s;
      font-family: inherit;
    }

    button:active { transform: scale(0.97); }

    #summarize-btn {
      background: linear-gradient(135deg, #6366f1, #818cf8);
      color: #fff;
      margin-top: 1rem;
      width: 100%;
    }

    #summarize-btn:hover:not(:disabled) { background: linear-gradient(135deg, #4f46e5, #6366f1); }
    #summarize-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    
    .spinner {
      display: none;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .spinner.active { display: inline-block; }

    /* results */
    #results { display: none; }
    #results.visible { display: block; }

    .result-label {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #6366f1;
      margin-bottom: 0.5rem;
    }

    .summary-text {
      line-height: 1.7;
      color: #d4d4d8;
      margin-bottom: 1.5rem;
    }

    .key-points { list-style: none; margin-bottom: 1.5rem; }

    .key-points li {
      position: relative;
      padding-left: 1.25rem;
      margin-bottom: 0.5rem;
      line-height: 1.5;
      color: #d4d4d8;
    }

    .key-points li::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0.55em;
      width: 7px;
      height: 7px;
      background: #6366f1;
      border-radius: 50%;
    }

    .badge {
      display: inline-block;
      background: rgba(99, 102, 241, 0.15);
      color: #818cf8;
      font-size: 0.8rem;
      font-weight: 600;
      padding: 0.3rem 0.85rem;
      border-radius: 999px;
      margin-bottom: 1.25rem;
    }

    #copy-btn {
      background: #27272a;
      color: #a1a1aa;
      font-size: 0.85rem;
      padding: 0.55rem 1.25rem;
    }

    #copy-btn:hover { background: #3f3f46; color: #e4e4e7; }

    
    #error-box {
      display: none;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid #ef4444;
      border-radius: 10px;
      padding: 1rem 1.25rem;
      color: #fca5a5;
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
      max-width: 680px;
      width: 100%;
    }

    #error-box.visible { display: block; }

    footer {
      margin-top: auto;
      padding-top: 2rem;
      color: #52525b;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>

  <h1>AI Text Summarizer</h1>
  <p class="subtitle">Paste your text below and get an instant AI-powered summary.</p>

  <div class="card">
    <label for="input-text">Your Text</label>
    <textarea id="input-text" placeholder="Paste or type your text here…" maxlength="5000"></textarea>
    <div class="counter" id="char-counter">0 / 5000</div>
    <button id="summarize-btn" type="button">
      <span class="spinner" id="spinner"></span>
      <span id="btn-label">Summarize</span>
    </button>
  </div>

  <div id="error-box"></div>

  <div class="card" id="results">
    <div class="result-label">Summary</div>
    <p class="summary-text" id="summary-text"></p>

    <div class="result-label">Key Points</div>
    <ul class="key-points" id="key-points"></ul>

    <div class="result-label">Word Count</div>
    <span class="badge" id="word-count"></span>

    <br /><br />
    <button id="copy-btn" type="button">Copy JSON</button>
  </div>

  <footer>&copy; 2026 AI Text Summarizer</footer>

  <script>
    const textarea     = document.getElementById("input-text");
    const charCounter  = document.getElementById("char-counter");
    const summarizeBtn = document.getElementById("summarize-btn");
    const btnLabel     = document.getElementById("btn-label");
    const spinner      = document.getElementById("spinner");
    const errorBox     = document.getElementById("error-box");
    const resultsCard  = document.getElementById("results");
    const summaryText  = document.getElementById("summary-text");
    const keyPointsUl  = document.getElementById("key-points");
    const wordCountEl  = document.getElementById("word-count");
    const copyBtn      = document.getElementById("copy-btn");

    let lastResponse = null;

   
    textarea.addEventListener("input", () => {
      const len = textarea.value.length;
      charCounter.textContent = `${len} / 5000`;
      charCounter.classList.toggle("limit", len >= 5000);
    });

  
    summarizeBtn.addEventListener("click", async () => {
      const text = textarea.value.trim();
      if (!text) return;

      
      errorBox.classList.remove("visible");
      resultsCard.classList.remove("visible");
      summarizeBtn.disabled = true;
      spinner.classList.add("active");
      btnLabel.textContent = "Summarizing…";

      try {
        const res = await fetch("/summarize", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text }),
        });

        const data = await res.json();

        if (!res.ok) {
          const msg = data.detail?.error || data.detail || data.error || "Something went wrong.";
          throw new Error(msg);
        }

        lastResponse = data;


        summaryText.textContent = data.summary;

        keyPointsUl.innerHTML = "";
        (data.key_points || []).forEach((pt) => {
          const li = document.createElement("li");
          li.textContent = pt;
          keyPointsUl.appendChild(li);
        });

        wordCountEl.textContent = `${data.word_count} words`;
        resultsCard.classList.add("visible");
      } catch (err) {
        errorBox.textContent = err.message;
        errorBox.classList.add("visible");
      } finally {
        summarizeBtn.disabled = false;
        spinner.classList.remove("active");
        btnLabel.textContent = "Summarize";
      }
    });

    
    copyBtn.addEventListener("click", () => {
      if (!lastResponse) return;
      navigator.clipboard.writeText(JSON.stringify(lastResponse, null, 2)).then(() => {
        copyBtn.textContent = "Copied!";
        setTimeout(() => { copyBtn.textContent = "Copy JSON"; }, 1500);
      });
    });
  </script>
</body>
</html>
