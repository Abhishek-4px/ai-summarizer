<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Text Summarizer</title>
  <meta name="description" content="Summarize any text instantly using AI. Get concise summaries and key points." />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Georgia, 'Times New Roman', serif;
      background: #F5F0E1;
      color: #2C2420;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1rem 2rem;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #5C4033;
      margin-bottom: 0.25rem;
      letter-spacing: -0.01em;
    }

    .subtitle {
      color: #8A7E76;
      font-size: 0.95rem;
      margin-bottom: 2.5rem;
      font-style: italic;
    }

    .card {
      background: #FFFDF7;
      border: 1px solid #E2D9C8;
      border-radius: 8px;
      padding: 1.75rem;
      width: 100%;
      max-width: 680px;
      box-shadow: 0 1px 4px rgba(44, 36, 32, 0.06);
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      font-weight: 700;
      margin-bottom: 0.5rem;
      font-size: 0.85rem;
      color: #5C4033;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    textarea {
      width: 100%;
      height: 180px;
      background: #FFFDF7;
      border: 1px solid #E2D9C8;
      border-radius: 6px;
      color: #2C2420;
      padding: 1rem;
      font-size: 0.95rem;
      font-family: 'Courier New', Courier, monospace;
      resize: vertical;
      transition: border-color 0.2s, box-shadow 0.2s;
      line-height: 1.6;
    }

    textarea::placeholder { color: #B8ADA3; }

    textarea:focus {
      outline: none;
      border-color: #8B5E3C;
      box-shadow: 0 0 0 2px rgba(139, 94, 60, 0.12);
    }

    .counter {
      text-align: right;
      font-size: 0.78rem;
      color: #8A7E76;
      margin-top: 0.4rem;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      transition: color 0.2s;
    }

    .counter.limit { color: #9B2C2C; font-weight: 600; }

    button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.75rem 1.75rem;
      border: none;
      border-radius: 6px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s, transform 0.1s;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    button:active { transform: scale(0.97); }

    #summarize-btn {
      background: #5C4033;
      color: #F5F0E1;
      margin-top: 1rem;
      width: 100%;
    }

    #summarize-btn:hover:not(:disabled) { background: #8B5E3C; }
    #summarize-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    .spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(245, 240, 225, 0.3);
      border-top-color: #F5F0E1;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner.active { display: inline-block; }

    #results { display: none; }
    #results.visible { display: block; }

    .result-label {
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #8B5E3C;
      margin-bottom: 0.5rem;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    .summary-text {
      line-height: 1.8;
      color: #3D322A;
      margin-bottom: 1.5rem;
      font-size: 1.02rem;
    }

    .key-points { list-style: none; margin-bottom: 1.5rem; }

    .key-points li {
      position: relative;
      padding-left: 1.25rem;
      margin-bottom: 0.6rem;
      line-height: 1.6;
      color: #3D322A;
    }

    .key-points li::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0.55em;
      width: 6px;
      height: 6px;
      background: #8B5E3C;
      border-radius: 50%;
    }

    .badge {
      display: inline-block;
      background: #EDE6D6;
      color: #5C4033;
      font-size: 0.8rem;
      font-weight: 600;
      padding: 0.3rem 0.9rem;
      border-radius: 999px;
      margin-bottom: 1.25rem;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    #copy-btn {
      background: transparent;
      color: #8B5E3C;
      border: 1px solid #E2D9C8;
      font-size: 0.82rem;
      padding: 0.55rem 1.25rem;
    }

    #copy-btn:hover { background: #EDE6D6; color: #5C4033; }

    #error-box {
      display: none;
      background: #FDF2F2;
      border: 1px solid #E8B4B8;
      border-radius: 6px;
      padding: 1rem 1.25rem;
      color: #9B2C2C;
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
      max-width: 680px;
      width: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    #error-box.visible { display: block; }

    footer {
      margin-top: auto;
      padding-top: 2rem;
      color: #B8ADA3;
      font-size: 0.78rem;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
  </style>
</head>
<body>

  <h1>AI Text Summarizer</h1>
  <p class="subtitle">Paste your text below and get an instant AI-powered summary.</p>

  <div class="card">
    <label for="input-text">Your Text</label>
    <textarea id="input-text" placeholder="Paste or type your text here…" maxlength="5000"></textarea>
    <div class="counter" id="char-counter">0 / 5000</div>
    <button id="summarize-btn" type="button">
      <span class="spinner" id="spinner"></span>
      <span id="btn-label">Summarize</span>
    </button>
  </div>

  <div id="error-box"></div>

  <div class="card" id="results">
    <div class="result-label">Summary</div>
    <p class="summary-text" id="summary-text"></p>

    <div class="result-label">Key Points</div>
    <ul class="key-points" id="key-points"></ul>

    <div class="result-label">Word Count</div>
    <span class="badge" id="word-count"></span>

    <br /><br />
    <button id="copy-btn" type="button">Copy JSON</button>
  </div>

  <footer>&copy; 2025 AI Text Summarizer</footer>

  <script>
    const textarea     = document.getElementById("input-text");
    const charCounter  = document.getElementById("char-counter");
    const summarizeBtn = document.getElementById("summarize-btn");
    const btnLabel     = document.getElementById("btn-label");
    const spinner      = document.getElementById("spinner");
    const errorBox     = document.getElementById("error-box");
    const resultsCard  = document.getElementById("results");
    const summaryText  = document.getElementById("summary-text");
    const keyPointsUl  = document.getElementById("key-points");
    const wordCountEl  = document.getElementById("word-count");
    const copyBtn      = document.getElementById("copy-btn");

    let lastResponse = null;

    textarea.addEventListener("input", () => {
      const len = textarea.value.length;
      charCounter.textContent = `${len} / 5000`;
      charCounter.classList.toggle("limit", len >= 5000);
    });

    summarizeBtn.addEventListener("click", async () => {
      const text = textarea.value.trim();
      if (!text) return;

      errorBox.classList.remove("visible");
      resultsCard.classList.remove("visible");
      summarizeBtn.disabled = true;
      spinner.classList.add("active");
      btnLabel.textContent = "Summarizing…";

      try {
        const res = await fetch("/summarize", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text }),
        });

        const data = await res.json();

        if (!res.ok) {
          const msg = data.detail?.error || data.detail || data.error || "Something went wrong.";
          throw new Error(msg);
        }

        lastResponse = data;

        summaryText.textContent = data.summary;

        keyPointsUl.innerHTML = "";
        (data.key_points || []).forEach((pt) => {
          const li = document.createElement("li");
          li.textContent = pt;
          keyPointsUl.appendChild(li);
        });

        wordCountEl.textContent = `${data.word_count} words`;
        resultsCard.classList.add("visible");
      } catch (err) {
        errorBox.textContent = err.message;
        errorBox.classList.add("visible");
      } finally {
        summarizeBtn.disabled = false;
        spinner.classList.remove("active");
        btnLabel.textContent = "Summarize";
      }
    });

    copyBtn.addEventListener("click", () => {
      if (!lastResponse) return;
      navigator.clipboard.writeText(JSON.stringify(lastResponse, null, 2)).then(() => {
        copyBtn.textContent = "Copied!";
        setTimeout(() => { copyBtn.textContent = "Copy JSON"; }, 1500);
      });
    });
  </script>
</body>
</html>
